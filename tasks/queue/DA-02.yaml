eady used for /skills); POST accept/reject require CSRF headers (matching csrf_headers fixture usage elsewhere); list page shows a real Candidate created via store.create_asset_candidate; detail page renders provenance, evidence, and event history correctly; unknown asset id -> 404; accept transitions a candidate to accepted and logs owner_accepted with actor='owner'; reject transitions a candidate to rejected and logs owner_rejected; accepting an already-internally_validated or already-accepted asset does not silently corrupt state (assert your chosen idempotent-or-error behavior explicitly); a direct attempt to reach internally_validated via these routes without going through DA-01's real validation path is impossible (there is no route in this task that sets validation_status or monetization_thesis -- only DA-04 adds that); double-submitting accept (two POSTs in a row) does not produce two owner_accepted events for a no-op-idempotent design, or produces a clear error on the second one for an error-on-repeat design -- whichever you chose, prove it; HTML in a title/summary/evidence field is escaped in the rendered page, not executed (same style as SR-04's HTML-escaping test); provenance renders the correct source Task link and artifact links without copying or re-serving any file through a new route; existing routes (/, /dashboard, /skills, /employees/{id}, /tasks/{id}) are unaffected; full existing suite (all tests through DA-01) plus these new tests pass.\n\nDeploy normally (this changes ego_os/main.py and templates/ -- always requires a restart, never a metadata-only fast-forward). Confirm HTTP 401/200, service active, final-sync protocol as usual.\n\nAfter deploy, manually (via a real authenticated request to production, not a mock) create exactly one clearly-labeled SAFE TEST Candidate (title containing the literal words 'DA-02 SAFE TEST CANDIDATE', summary explicitly stating it exists only to verify the accept/reject flow and carries no real value) using stor