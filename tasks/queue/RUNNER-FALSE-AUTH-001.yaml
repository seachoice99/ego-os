    "summary": "session_manager.js's classifySessionOutcome() no longer scans the full stdout+stderr transcript for FATAL_PATTERNS. Added trustedFatalScanText(): fatal-pattern matching is now restricted to (1) real stderr in full, (2) stdout lines that parse as JSON with type 'system' or 'result' (the CLI's own operational events), and (3) raw stdout lines that fail to parse as JSON at all (the CLI breaking --output-format stream-json's own one-object-per-line contract to print an out-of-band message -- the exact shape the historical defect was captured in, per fake_claude.js's auth_disabled_exit_zero fixture). Never trusted: type 'user' (tool_result -- arbitrary file/command content) or type 'assistant' (model-generated text), both of which can legitimately quote or discuss the phrase without a real failure, as happened on AGENT-VERIFY. detectRateLimit's scan scope is untouched.",
