  "prompt": "Implement the v0.5 Digital Asset persistence model. Read memory/decisions/ADR-0007-digital-assets-are-durable-provenance-linked-records.md and architecture/013_DIGITAL_ASSET_MODEL.md FIRST -- they fix the concepts and rules this task implements; do not reinterpret or silently change them. Also read ego_os/store.py (SCHEMA string, _ensure_column pattern, existing table shapes -- reports/execution_events/skill_audit_events are the closest precedents), ego_os/main.py's download_artifact route (the exact path-traversal-safety pattern to reuse), and tests/test_skills_registry.py / tests/test_employee_skills.py for this repo's additive-migration and event-log testing conventions.\n\nAdd two new, additive SQLite tables to ego_os/store.py's existing SCHEMA string (CREATE TABLE IF NOT EXISTS, exactly like skill_audit_events was added) -- no ALTER on any existing table, no change to tasks/reports/memory/execution_events:\n\n1. digital_assets: id (INTEGER PRIMARY KEY AUTOINCREMENT), project_id (INTEGER REFERENCES projects(id)), source_task_id (INTEGER NOT NULL REFERENCES tasks(id)), title (TEXT NOT NULL), summary (TEXT NOT NULL), asset_type (TEXT NOT NULL), status (TEXT NOT NULL DEFAULT 'candidate'), origin (TEXT NOT NULL DEFAULT 'automatic'), target_audience (TEXT), reusable_value (TEXT), evidence (TEXT NOT NULL DEFAULT '[]' -- JSON list of short strings), value_thesis (TEXT), monetization_thesis (TEXT -- JSON object per architecture/013 Section 9 shape, nullable until validation passes), validation_status (TEXT -- nullable; null/started/passed/failed/needs_revision), owner_decision (TEXT -- nullable; null/accepted/rejected, a convenience mirror of the latest Owner decision, NOT the source of truth), provenance (TEXT NOT NULL -- JSON object written once at Candidate creation and never mutated afterward: {report_task_id, artifacts: [{filename, type}], employee_versions: {}, skills_used: [], model, created_at}. Report has no independent primary key in this schema (reports.task_id IS the primary key, 1:1 with the task), so provenance.report_task_id is the same value as source_task_id -- do not create a separate/duplicate 'source_report_task_id' column, this is a deliberate simplification per the meaning-not-literal-names instruction), created_at (TEXT NOT NULL DEFAULT (datetime('now'))), updated_at (TEXT NOT NULL DEFAULT (datetime('now'))).\n\n2. digital_asset_events (append-only, mirrors skill_audit_events' shape): id (INTEGER PRIMARY KEY AUTOINCREMENT), asset_id (INTEGER NOT NULL REFERENCES digital_assets(id)), event_type (TEXT NOT NULL -- one of: candidate_created, owner_accepted, owner_rejected, validation_started, validation_passed, validation_failed, thesis_updated, archived), actor (TEXT NOT NULL -- 'system' or 'owner'), detail (TEXT -- short operational summary, NEVER secrets or raw hidden model reasoning, matching architecture/003's rule already applied to skill_audit_events), created_at (TEXT NOT NULL DEFAULT (datetime('now'))).\n\nAdd Python functions to ego_os/store.py (follow the existing style: plain functions, get_connection()/close() pairs, json.dumps/loads at the boundary):\n\n- create_asset_candidate(project_id, source_task_id, title, summary, asset_type, target_audience, reusable_value, evidence, value_thesis, provenance) -> inserts a digital_assets row with status='candidate', origin='automatic', logs a candidate_created event (actor='system'), and returns the new asset id. Must raise a clear error (do not silently insert) if source_task_id does not reference an existing task.\n- get_asset(asset_id) / get_assets(status=None) -- deterministic listing, optionally filtered by status.\n- get_asset_by_source_task(source_task_id) -- returns the digital_assets row for that Task if one exists, else None. This is the exact function a later task (DA-03, automatic nomination) will use as its duplicate-prevention guard -- design it to answer 'has ANY asset (any status) already been created from this Task' cheaply and deterministically.\n- get_asset_events(asset_id) -- ORDER BY id, full history for one asset.\n- transition_asset(asset_id, new_status, event_type, actor, detail=None, validation_status=None, monetization_thesis=None) -- the SINGLE enforcement point for every status change. It must validate the transition against this explicit allowed-transition map before writing anything, and raise a clear, specific exception (not a bare Exception) otherwise:\n  * candidate -> accepted (event owner_accepted, actor must be 'owner')\n  * candidate -> rejected (event owner_rejected, actor must be 'owner')\n  * rejected -> accepted (event owner_accepted, actor must be 'owner' -- allowed ONLY as a brand-new explicit decision event; never triggered automatically, and the original owner_rejected event is never edited or removed)\n  * accepted -> internally_validated (event validation_passed, actor 'system' or 'owner') -- ONLY if validation_status is being set to 'passed' in this same call AND monetization_thesis is a non-empty value being recorded in this same call. Reject (raise) an attempt to reach internally_validated without both.\n  * any status -> archived (event archived) -- implement for model completeness per architecture/013 Section 6 even though DA-02 does not need to expose an archive route yet.\n  Explicitly REJECT (raise, do not silently allow): candidate -> internally_validated directly; accepted -> internally_validated without a passed validation_status + monetization_thesis in the same call; any transition not in the map above. validation_started/validation_failed/needs_revision update ONLY validation_status (and log the corresponding event) without changing the top-level status away from 'accepted'.\n- log_asset_event(asset_id, event_type, actor, detail=None) -- append-only insert, validates event_type against the fixed set above (same pattern as store.log_skill_audit_event's _SKILL_AUDIT_EVENT_TYPES check).\n- No function anywhere may DELETE a digital_assets or digital_asset_events row. Do not add one.\n\nAdd a safe artifact-provenance helper (in ego_os/tools.py or ego_os/store.py, your choice, but reuse the existing safety pattern from main.py's download_artifact route -- resolve the path against the task's own GENERATED_DIR, reject anything not is_relative_to that directory): given a task_id and a filename, verify the artifact actually exists on disk at that safe path before it can be referenced in a digital_assets.provenance JSON blob. Never copy the file -- only validate and store the filename/type reference. Raise a clear error on a traversal attempt (e.g. '../../secret') or a missing file; do not silently accept it.\n\nDo not build any HTTP route in this task -- DA-02 owns the UI. Do not touch lifecycle.py or worker.py -- DA-03 owns automatic nomination. This task is persistence-only.\n\nTests (tests/test_digital_assets.py, follow tests/test_skills_registry.py's tmp_path/temp_env conventions -- never touch the real local DB): additive migration applies cleanly against a copy of an old (pre-DA-01) database (same pattern as test_old_schema_db_migrates_safely_for_skill_columns); calling store.init_db() twice in a row does not error or duplicate anything; creating a Candidate succeeds and logs exactly one candidate_created event; an invalid status value passed directly is rejected; each disallowed transition listed above is rejected with a clear exception (test candidate->internally_validated directly, accepted->internally_validated missing validation_status, accepted->internally_validated missing monetization_thesis, rejected->accepted without an explicit new owner_accepted call succeeding as a distinct new event -- not a silent flip); provenance is recorded correctly and immutably (fetch it back, confirm it matches what was written, confirm a second, unrelated store call does not alter it); creating a Candidate against a source_task_id that does not exist is rejected; an old-shaped Report row (no digital_asset reference at all, since Reports never gained a new column here) still opens/reads fine, proving Reports were not touched; digital_asset_events only ever grows (append, never update/delete) across a sequence of real transitions; there is no code path that deletes a digital_assets or digital_asset_events row (a direct test asserting the module has no such function, or asserting row counts never decrease across a full history); an artifact-provenance reference with a path-traversal filename ('../../evil') is rejected; the full existing suite (105 pytest tests as of the last verified run) plus these new tests all pass; node --test (14 existing release_sync tests) is unaffected and still passes.\n\nBefore deploy: take a production DB backup (SQLite .backup, same as prior DA/SR backups -- see DEPLOYMENT.md's Backups section), run PRAGMA integrity_check on the backup and confirm 'ok' before proceeding. This is an additive-only migration (new tables only, no ALTER), but back it up anyway per the standing rule for any schema change. Deploy normally (pull, restart, health check) since this changes ego_os/. Confirm HTTP 401 unauthenticated / 200 authenticated, service active, and follow the final-sync protocol (rules 9-10 of your own instructions) for the closing metadata commit exactly as already required for every automatic-release task.",
