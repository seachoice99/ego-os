  "title": "Automatic Digital Asset Candidate nomination after successful Delivery",
  "prompt": "Depends on DA-01 (store.create_asset_candidate, store.get_asset_by_source_task, the safe artifact-provenance helper). Read architecture/013_DIGITAL_ASSET_MODEL.md and ADR-0007 first. Read ego_os/lifecycle.py's run() function in full (the Delivery and Memory Update steps at the end, and how _resolve_employee_skills/skill resolution is already wrapped in its own try/except that logs an execution_event without affecting the surrounding flow -- that is the pattern to copy) and ego_os/model_provider.py (how capability -> model mapping and model_provider.complete's (text, in_tok, out_tok, cost) return shape work) and ego_os/worker.py's process_one (why lifecycle.run() must fully return before run_state flips to 'completed', and why an exception anywhere inside it currently marks the whole task 'failed' -- this is exactly the failure mode this task must prevent for the new assessment step specifically).\n\nAdd a bounded, non-blocking assessment step as the LAST thing lifecycle.run() does, strictly after Delivery (store.update_task_status(task_id, 'delivered')) and Memory Update (store.create_memory_entry) have already fully committed -- so a successfully delivered Task's Delivery and Memory Update are never at risk from anything in this step. Wrap the ENTIRE assessment call (model call, JSON parsing, candidate creation) in its own try/except Exception at the call site inside run(); on any exception, log an execution_event (step='asset_assessment', status='error', detail=<short clean message, never a raw stack trace or raw model output>) and let run() return normally -- never re-raise, never let this exception propagate to worker.process_one's own try/except (which would incorrectly flip run_state to 'failed' for a Task that was already genuinely delivered).\n\nIdempotency (assessment runs at MOST once per Task, survives a restart, and a duplicate lifecycle.run() call for the same task_id can never create two Candidates or spend tokens twice): before doing anything else in the assessment step, call store.get_asset_by_source_task(task_id) as a cheap first check (a Candidate/Asset already exists for this Task -- skip entirely, do not call the model). Additionally, log an execution_event with step='asset_assessment' regardless of outcome (candidate created, not a candidate, or error) -- and also check for an EXISTING step='asset_assessment' execution_event for this task_id before proceeding, so even a Task that was correctly judged 'not a candidate' the first time is never re-assessed (and never re-billed) on a second lifecycle.run() invocation for the same task_id.\n\nOnly assess a Task whose lifecycle actually reached 'delivered' status -- never a Task that is still at 'awaiting_approval'/'gap_approved'/'gap_rejected' (a capability-gap task never reaches this code path at all, since gap-handling returns early in run() before Delivery), and never call the assessment if run() is about to raise for any other reason. This is a cheap, free filter -- do not spend a single model call assessing anything that was not actually, successfully delivered.\n\nAdd a new model_provider.py capability tag, e.g. 'asset_assessment' (does not need a distinct model from what other capabilities already use -- follow the existing capability -> model mapping pattern exactly).\n\nThe assessment is exactly one model_provider.complete call. Build a prompt containing: the original request_text, the delivered draft_text (the specialist's final result), and the list of artifact filenames/types if any (from the `artifacts` variable already available in run() at that point) -- do not invent new context gathering. Instruct the model to reply with ONLY a single strict JSON object matching this shape (parse it the same defensive way _draft_employee_proposal already parses JSON from a model reply -- find the first '{' and use json.JSONDecoder().raw_decode, never a naive json.loads on the whole string, and treat any parse failure as is_candidate=false with reason_not_candidate='malformed assessment response', not as an error that blocks delivery):\n{\"is_candidate\": bool, \"title\": str, \"asset_type\": str, \"summary\": str, \"target_audience\": str, \"reusable_value\": str, \"evidence\": [str, ...], \"value_thesis\": str, \"confidence\": float between 0 and 1, \"reason_not_candidate\": str or null}\n\nThe assessment prompt must explicitly instruct the model NOT to nominate every result by default, and give concrete negative examples it must judge as NOT a candidate: a one-off short answer with no durable artifact/knowledge/process; a result with no repeat value; a purely technical/plumbing/health-check/infrastructure-verification output; a generic or vague claim of reusability without specifics. Do not write a prompt that flatters every result as valuable -- bias it toward skepticism, matching the acceptance criteria below.\n\nDefine one named constant CONFIDENCE_THRESHOLD = 0.7 in lifecycle.py. A Candidate is created via store.create_asset_candidate ONLY if ALL of: is_candidate is true; confidence >= CONFIDENCE_THRESHOLD; reusable_value is a non-empty, non-generic string (reject empty/whitespace-only and anything under roughly 15 characters as too vague to be 'specific' -- a simple, defensible, testable proxy for specificity, not NLP-based judgment); evidence is a non-empty list with at least one real item; and store.get_asset_by_source_task(task_id) still confirms no Candidate already exists for this Task (recheck right before insert, not only at the top of the function, in case of any race). If any condition fails, no Candidate is created, and the execution_event still records the outcome (e.g., 'not nominated: confidence 0.42 below threshold' or 'not nominated: is_candidate=false') -- structured and operational, never the model's raw reasoning text.\n\nTrack the assessment's own cost: log input_tokens/output_tokens/cost on the same execution_event (step='asset_assessment') using the model_provider.complete return values, exactly like every other execution_event in this file already does. Do not attempt to retroactively add this cost to the Task's own already-created Report (reports must never be rewritten) -- the execution_events row is where this cost is visible, which is consistent with how skill_resolution's own cost-free step is already logged there.\n\nBuild the provenance JSON exactly as DA-01 defined it (report_task_id, artifacts list from the real `artifacts` variable using DA-01's safe artifact-provenance helper for each one, employee_versions and skills_used copied from the same values already computed in run() for the Report, model used, created_at).\n\nTests (tests/test_asset_nomination.py, use the fake_model_complete fixture exactly like existing lifecycle tests -- script realistic JSON responses for the 'asset_assessment' capability, do not call a real model): a valuable-document scripted response creates a Candidate with correct provenance; a reusable-code scripted response creates a Candidate; a research-dataset-with-real-evidence scripted response creates a Candidate; a one-off-short-answer scripted response (is_candidate=false or low confidence) creates NO Candidate; a Task that ends failed (run_state='failed') is never assessed at all (assert the 'asset_assessment' capability was never called -- reuse fake_model_complete.calls the same way other fail-closed tests already do); a Task that ends at gap_approved/gap_rejected (capability gap) is never assessed; calling process_task twice for the same task_id (simulating a restart/duplicate invocation) creates at most one Candidate and calls the assessment capability at most once total; a malformed (non-JSON) assessment response results in no Candidate and does not fail the Task -- Task remains run_state='completed'/status='delivered'; a assessment capability that raises (simulating a model/provider error) does not fail the Task either -- same guarantee; a scripted response with confidence below CONFIDENCE_THRESHOLD creates no Candidate; a scripted response with an empty evidence list creates no Candidate; the execution_event for step='asset_assessment' records nonzero cost/tokens matching the scripted response; Delivery and the Report are unaffected (report_text/status/artifacts identical) whether or not a Candidate is created, and specifically identical between the assessment-succeeds and assessment-raises scenarios for the same underlying Task; the full existing suite (all tests through DA-02) plus these new tests pass.\n\nAfter deploy, submit two REAL production tasks (not mocked) through the real HTTP flow and confirm via direct, safe, read-only inspection of the production digital_assets table (same SSH/sqlite3 read pattern already used throughout this repository's production verification -- never a write outside the app's own routes): (1) a task whose request is obviously a one-off, throwaway short answer (e.g., 'what is 2+2') -- confirm NO Candidate exists for that task's id afterward; (2) a task that genuinely produces something with real reusable value (e.g., asking Writer or Coder for a real, substantial, reusable document or reference implementation) -- confirm a Candidate WAS created with sensible title/summary/evidence. Do not accept either Candidate -- DA-03 only nominates, per ADR-0007 decision 2.",
  "acceptance": [
