  "prompt": "Depends on DA-01, DA-02, DA-03. Read architecture/013_DIGITAL_ASSET_MODEL.md Sections 7 and 9, and ADR-0007 first. Read ego_os/worker.py in full and ego_os/lifecycle.py's run() function -- you must reuse the existing background worker (queue.Queue + one thread, process_one's idempotent-by-run_state pattern) and the existing execution_events logging convention. Do not create a second worker framework, a second queue, or a second thread model.\n\nAdd POST /assets/{id}/validate to ego_os/main.py (existing Owner auth + CSRF dependency, no new wiring). It is only valid to call this on an asset whose status is 'accepted' -- calling it on a 'candidate', 'rejected', 'internally_validated', or 'archived' asset must return a clear 4xx error and must not start anything. On success it must trigger exactly one bounded validation job and record a validation_started event (store.log_asset_event / store.transition_asset with validation_status='started', per DA-01's transition rules -- validation_started stays at status='accepted', it does not change status yet).\n\nHow the validation job actually runs: reuse the existing worker (ego_os/worker.py) and execution_events logging -- do not invent a second background mechanism. The simplest correct approach that satisfies 'uses the existing worker and execution logging, not a second parallel worker framework': model the validation job as a normal Task-like unit of work processed on the SAME worker thread/queue instance already running (e.g., a small queued item routed through worker.py's existing queue.Queue, or a bounded function invoked the same way process_one is invoked -- your call on the exact mechanism, but it must be the SAME thread/queue instance, not a second one, and it must log execution_events with a distinguishing step like 'asset_validation' carrying the asset_id it is validating). It must be idempotent (running it twice for an asset already at validation_status in ('passed','failed','needs_revision') without a new explicit POST /assets/{id}/validate call must not silently re-validate) and must survive a worker restart the same way Task processing already does (an interrupted validation should not be silently lost or silently marked passed -- record it in a way an Owner can see it needs to be retried, following the existing recover_interrupted_tasks() precedent conceptually, adapted for asset validation rather than duplicating unrelated Task-specific logic).\n\nThe validation job checks, using real reads (never fabricated): the source artifact/reference recorded in provenance still exists and is reachable (reuse DA-01's safe artifact-provenance check); the result is reproducible or accessible (the source Task/Report can still be read); the claimed target_audience is specific, not vague (same specificity proxy DA-03 already established -- non-empty, not just a few characters); the claimed reusable_value is substantiated by the recorded evidence, not merely asserted (a single model_provider.complete call, using a new capability tag e.g. 'asset_validation', given the asset's summary/evidence/target_audience/reusable_value/value_thesis and asked to judge these things plus surface known shortcomings and a next internal step; parse its structured JSON reply defensively exactly like DA-03's assessment parsing, never trust free text); there is no apparent violation of an Owner constraint (nothing here should ever recommend or imply an external action -- if the model's reply ever suggests one, treat that as a failed validation with a note, never surface it as an executable action); shortcomings are captured; an internal next step is captured.\n\nRecord the validation result as one of: passed, failed, needs_revision (store the classification via store.transition_asset's validation_status parameter). Log an execution_event (step='asset_validation') with input_tokens/output_tokens/cost from the model_provider.complete call, exactly matching DA-03's cost-tracking pattern.\n\nFor a 'passed' result ONLY: the asset must additionally receive a monetization_thesis before store.transition_asset can move it to internally_validated (DA-01 already enforces this -- do not bypass it, do not call transition_asset without a real thesis). Build the monetization_thesis as a structured JSON object with exactly these fields (matching architecture/013 Section 9): who_this_could_help (concrete, not generic), what_value_might_be_paid_for, cheapest_next_test, unproven_assumptions (list), prohibited_without_owner_approval (a fixed, non-model-generated string stating plainly that no outreach, no publication, no external transaction, no capital spend, and no Stage 3 transition may happen without separate Owner approval -- do not let the model author this field, hardcode it so it can never be softened or omitted). Only after this thesis is built does the code call store.transition_asset(asset_id, 'internally_validated', 'validation_passed', actor='system', validation_status='passed', monetization_thesis=<the JSON above>).\n\nFor 'failed' or 'needs_revision': log the event, leave status at 'accepted', do not touch monetization_thesis, and make the shortcomings/next-step visible in the event detail (structured, short, no raw model chain-of-thought).\n\nAbsolutely nothing in this task may perform, queue, or recommend as executable any external action: no outreach, no publication, no payment, no capital spend, no automatic transition toward Stage 3 or Controlled Monetization. If you find yourself writing code that could plausibly send something outside the company's own database, stop and do not build it -- that is out of scope and would violate ADR-0007 decision 5 and the Stage 2 Gate Control rules in architecture/006.\n\nAdd a rendering of the monetization thesis's structured fields and the validation event history on the existing GET /assets/{id} page (ego_os/templates/asset_detail.html from DA-02) -- extend that template, do not create a duplicate detail page.\n\nTests (tests/test_asset_validation.py): only an 'accepted' asset can be validated (attempting on candidate/rejected/internally_validated/archived returns a clear error and starts nothing); validating an asset whose provenance points at a missing/removed artifact reference is handled as a failed or needs_revision validation, never a crash, never a false 'passed'; a scripted 'passed' response with concrete answers correctly reaches internally_validated with a well-formed monetization_thesis containing all five required fields including the hardcoded prohibited_without_owner_approval text; a scripted 'failed' response leaves status at 'accepted' with validation_status='failed' and no monetization_thesis; a scripted 'needs_revision' response leaves status at 'accepted' with validation_status='needs_revision'; a 'passed' classification without the code actually building a monetization_thesis is impossible (this should be structurally guaranteed by construction, not just tested, but add a test proving transition_asset is never called for internally_validated without one, reusing DA-01's own guard); the validation job performs no external action of any kind (there is nothing to mock-assert against a network call, but assert no such call path exists / no outbound-request-shaped function is invoked -- reuse whatever pattern the test suite already uses to prove Skills Registry execution never happens, e.g. asserting only the expected local calls occurred); execution_events records the validation's cost; calling validate twice on the same accepted asset without an intervening state change is idempotent-or-clear-error (pick one, prove it, consistent with DA-02's accept/reject idempotency choice); a simulated worker restart mid-validation does not silently mark the asset passed and leaves visible evidence it needs retry; pre-existing Tasks/Reports/Assets from before this task are completely unaffected (a Task created and delivered under DA-03 alone, with no validate call, still shows correctly). Full test suite (all tests through DA-03, plus these new ones) passes.\n\nDeploy normally (ego_os/ changed, always a full restart). Confirm HTTP 401/200, service active, final-sync protocol.",
