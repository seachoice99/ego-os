<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ego OS — {{ project.name }} memory</title>
  <link rel="stylesheet" href="/static/theme.css">
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 0.2rem; }
    .subtitle { color: var(--muted); margin-top: 0; }
    .entry { border: 1px solid var(--card-border); background: var(--card-bg); border-radius: 8px; padding: 0.8rem 1rem; margin-top: 0.8rem; }
    .entry .meta { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.3rem; }
    a { text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <p><a href="/dashboard">&larr; back to dashboard</a></p>
  <h1>{{ project.name }}</h1>
  <p class="subtitle">{{ project.vision or '' }}</p>
  <h2>Memory</h2>
  {% if entries %}
  {% for e in entries %}
  <div class="entry">
    <div class="meta">Task <a href="/tasks/{{ e.task_id }}">#{{ e.task_id }}</a> &middot; {{ e.created_at }}</div>
    <p>{{ e.summary }}</p>
  </div>
  {% endfor %}
  {% else %}
  <p>No memory recorded for this project yet.</p>
  {% endif %}
</body>
</html>
